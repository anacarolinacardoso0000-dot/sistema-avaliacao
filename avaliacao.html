<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Avaliação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }

        h3 {
            color: #333;
            margin-bottom: 20px;
        }

        .stars-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .star-btn {
            background: none;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #555;
        }

        .star-btn:hover {
            background-color: #ffca28;
            border-color: #ffca28;
            color: #fff;
            transform: scale(1.1);
        }

        .star-btn.selected {
            background-color: #ffb300;
            border-color: #ffb300;
            color: #fff;
        }

        .hidden {
            display: none;
        }

        .comment-section {
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .submit-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            background-color: #e8f5e9;
            color: #2e7d32;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>Como foi seu atendimento?</h3>
        
        <!-- Botões de avaliação (1 a 5) -->
        <div class="stars-container">
            <button class="star-btn" onclick="selecionarNota(1)">1★</button>
            <button class="star-btn" onclick="selecionarNota(2)">2★</button>
            <button class="star-btn" onclick="selecionarNota(3)">3★</button>
            <button class="star-btn" onclick="selecionarNota(4)">4★</button>
            <button class="star-btn" onclick="selecionarNota(5)">5★</button>
        </div>

        <!-- Mensagem de envio automático da nota -->
        <div id="nuvem-status" class="status-message hidden">
            ☁️ Nota <span id="nota-inserida"></span> enviada para a nuvem com sucesso!
        </div>

        <!-- Campo de comentário opcional -->
        <div id="comment-section" class="comment-section hidden">
            <p style="font-size: 14px; color: #666; text-align: left; margin-bottom: 5px;">Deixe um comentário (opcional):</p>
            <textarea id="comentario-texto" placeholder="Conte-nos mais sobre sua experiência..."></textarea>
            <button class="submit-btn" onclick="enviarComentario()">Enviar Comentário</button>
        </div>
    </div>

    <script>
        let notaSelecionada = 0;

        function selecionarNota(nota) {
            notaSelecionada = nota;
            
            // Remove a classe 'selected' de todos os botões e adiciona apenas no clicado
            const botoes = document.querySelectorAll('.star-btn');
            botoes.forEach((btn, index) => {
                if (index < nota) {
                    btn.classList.add('selected'); // Destaca as estrelas até a nota clicada
                } else {
                    btn.classList.remove('selected');
                }
            });

            // Atualiza e mostra a mensagem de envio para a nuvem
            const statusNuvem = document.getElementById('nuvem-status');
            document.getElementById('nota-inserida').innerText = nota + (nota === 1 ? ' estrela' : ' estrelas');
            statusNuvem.classList.remove('hidden');

            // Exibe a seção de comentários
            document.getElementById('comment-section').classList.remove('hidden');
        }

        function enviarComentario() {
            const comentario = document.getElementById('comentario-texto').value;
            
            // Aqui você faria a integração real com o banco de dados/API
            console.log(`Dados salvos na nuvem: Nota ${notaSelecionada}, Comentário: "${comentario}"`);

            // Feedback visual final para o usuário
            alert(`Obrigado! Seu comentário também foi salvo na nuvem.`);
            
            // Reseta o formulário
            document.getElementById('comentario-texto').value = '';
            document.getElementById('comment-section').classList.add('hidden');
            document.getElementById('nuvem-status').classList.add('hidden');
            document.querySelectorAll('.star-btn').forEach(btn => btn.classList.remove('selected'));
        }
    </script>

</body>
</html>
